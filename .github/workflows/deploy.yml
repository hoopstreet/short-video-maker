name: Sync UI and Build Backend
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git rm -r --cached static/music || true
          git push --force https://hoopstreet:$HF_TOKEN@huggingface.co/spaces/hoopstreet/short-video-maker main
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: hoopstreet
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & Push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: main-tiny.Dockerfile
          push: true
          tags: hoopstreet/short-video-maker:latest-tiny
